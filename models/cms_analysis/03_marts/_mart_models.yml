version: 2

models:
  - name: dim_geography
    description: "The primary dimension for geographic analysis."
    columns:
      - name: geo_key
        tests:
          - unique
          - not_null

  - name: dim_hcpcs
    description: "The dimension for medical procedure codes and classifications."
    columns:
      - name: hcpcs_key
        tests:
          - unique
          - not_null
      - name: service_category
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Wellness', 'LTC Routine', 'ALF Routine']

  - name: fct_cms_utilization
    description: "State-level summary of AWV Penetration Rates, comparing preventative wellness visits to routine LTC/ALF encounters."
    columns:
      - name: geo_key
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('dim_geography')
                field: geo_key

      - name: awv_volume
        description: "Count of Wellness services (G0438, G0439)."
        tests:
          - not_null

      - name: ltc_encounters
        description: "Count of routine encounters (99307-99310, 99347-99350)."
        tests:
          - not_null

      - name: awv_penetration_rate
        description: "The ratio of AWV services to LTC encounters. Higher values indicate a stronger preventative care mindset."
        tests:
          - not_null