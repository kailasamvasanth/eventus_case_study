version: 2

models:
  - name: dim_geography
    description: "The primary dimension for geographic analysis."
    columns:
      - name: geo_key
        tests:
          - unique
          - not_null

  - name: dim_hcpcs
    description: "The dimension for medical procedure codes and classifications."
    columns:
      - name: hcpcs_key
        tests:
          - unique
          - not_null
      - name: service_category
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Wellness', 'LTC Routine', 'ALF Routine']

  - name: fct_cms_utilization
    description: "The central fact table containing quantitative utilization metrics."
    columns:
      - name: geo_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_geography')
                field: geo_key
      - name: hcpcs_key
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('dim_hcpcs')
                field: hcpcs_key